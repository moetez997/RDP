name: Windows RDP Pro (Fixed DPI + Auto-Restart)

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Enable Remote Desktop
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name fDenyTSConnections -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name UserAuthentication -Value 1

      - name: Fix DPI and Screen Resolution (Make Everything Normal Size)
        run: |
          # تحميل أداة QRes لتغيير الدقة (إذا أمكن)
          $qresUrl = "https://github.com/justice717/QRes/raw/master/QRes.exe"
          $qresPath = "$env:TEMP\QRes.exe"
          Invoke-WebRequest -Uri $qresUrl -OutFile $qresPath -UseBasicParsing
          & $qresPath /x:1920 /y:1080
          
          # ضبط مقياس DPI إلى 100% (الحل الأساسي)
          Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name "LogPixels" -Value 96 -Type DWord
          Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name "Win8DpiScaling" -Value 0 -Type DWord
          
          # إعادة تشغيل Explorer
          taskkill /f /im explorer.exe
          Start-Sleep -Seconds 2
          Start-Process explorer.exe
          Write-Host "DPI set to 100%. Screen resolution attempted 1920x1080."

      - name: Optimize RDP Performance
        run: |
          Set-ItemProperty -Path "HKLM:\Software\Policies\Microsoft\Windows NT\Terminal Services" -Name "fDisableAnimations" -Value 1
          Set-ItemProperty -Path "HKLM:\Software\Policies\Microsoft\Windows NT\Terminal Services" -Name "fDisableAudioCapture" -Value 1
          powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c

      - name: Improve RDP Video Quality
        run: |
          Set-ItemProperty -Path "HKLM:\Software\Policies\Microsoft\Windows NT\Terminal Services" -Name "fEnableH264" -Value 1
          Set-ItemProperty -Path "HKLM:\Software\Policies\Microsoft\Windows NT\Terminal Services" -Name "SelectTransport" -Value 1

      - name: Enhance Mouse Responsiveness
        run: |
          Set-ItemProperty -Path "HKCU:\Control Panel\Mouse" -Name "MouseSensitivity" -Value "20"
          Set-ItemProperty -Path "HKCU:\Control Panel\Mouse" -Name "MouseSpeed" -Value "0"
          Set-ItemProperty -Path "HKCU:\Control Panel\Mouse" -Name "MouseThreshold1" -Value "0"
          Set-ItemProperty -Path "HKCU:\Control Panel\Mouse" -Name "MouseThreshold2" -Value "0"

      - name: Create Admin User
        run: |
          $user = "rdpuser"
          $pass = "StrongPass123!"
          net user $user $pass /add
          net localgroup administrators $user /add
          net localgroup "Remote Desktop Users" $user /add

      - name: Install Tailscale
        run: |
          Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile tailscale.exe
          Start-Process tailscale.exe -ArgumentList "/S" -Wait

      - name: Connect Tailscale
        run: |
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}
          Start-Sleep -Seconds 5

      - name: Allow Tailscale IPs in Firewall
        run: |
          New-NetFirewallRule -DisplayName "Allow RDP from Tailscale" -Direction Inbound -Protocol TCP -LocalPort 3389 -Action Allow -RemoteAddress "100.64.0.0/10"

      - name: Force Custom Wallpaper (Optional)
        run: |
          $url = "https://raw.githubusercontent.com/moetez997/RDP/main/1776448017236.png"
          $output = "$env:TEMP\wallpaper.png"
          Invoke-WebRequest -Uri $url -OutFile $output -UseBasicParsing
          Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name Wallpaper -Value $output
          Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name WallpaperStyle -Value 2
          taskkill /f /im explorer.exe
          Start-Process explorer.exe
          Write-Host "Wallpaper applied."

      - name: Get Tailscale IP with retry
        run: |
          $ts = "C:\Program Files\Tailscale\tailscale.exe"
          $ip = $null
          for ($i=0; $i -lt 10; $i++) {
            $ip = & $ts ip -4
            if ($ip -match '^100\.\d+\.\d+\.\d+$') {
              break
            }
            Write-Host "Waiting for Tailscale IP... attempt $($i+1)"
            Start-Sleep -Seconds 3
          }
          if (-not $ip) {
            Write-Error "Failed to get Tailscale IP"
            exit 1
          }
          echo "TAILSCALE_IP=$ip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Show RDP Info
        run: |
          Write-Host ""
          Write-Host "============================"
          Write-Host "RDP SERVER READY (DPI Fixed)"
          Write-Host "IP: $env:TAILSCALE_IP"
          Write-Host "USER: rdpuser"
          Write-Host "PASS: StrongPass123!"
          Write-Host "============================"
          Write-Host "If screen still large, right-click desktop -> Display settings -> Scale: 100%"

      - name: Keep Runner Alive (silent, then auto-restart)
        run: |
          $totalMinutes = 355
          $sleepSeconds = 300
          $iterations = [math]::Floor($totalMinutes * 60 / $sleepSeconds)
          for ($i=0; $i -lt $iterations; $i++) {
            Start-Sleep -Seconds $sleepSeconds
          }
          Write-Host "Triggering next workflow before timeout..."

      - name: Trigger next workflow (auto-restart)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          $repo = "$env:GITHUB_REPOSITORY"
          $workflow_id = "rdp-pro.yml"
          $url = "https://api.github.com/repos/$repo/actions/workflows/$workflow_id/dispatches"
          $body = @{ ref = "main" } | ConvertTo-Json
          Invoke-RestMethod -Uri $url -Method Post -Headers @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github.v3+json"
          } -Body $body -ContentType "application/json"
          Write-Host "New workflow triggered"

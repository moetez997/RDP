name: Windows RDP Pro

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:

    - name: Enable Remote Desktop
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name fDenyTSConnections -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name UserAuthentication -Value 1

    - name: Create Admin User
      run: |
        $user="rdpuser"
        $pass="StrongPass123!"
        net user $user $pass /add
        net localgroup administrators $user /add
        net localgroup "Remote Desktop Users" $user /add

    - name: Install Tailscale
      run: |
        Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile tailscale.exe
        Start-Process tailscale.exe -ArgumentList "/S" -Wait

    - name: Connect Tailscale
      run: |
        & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}

    - name: Show RDP Info
      run: |
        $ip = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
        Write-Host ""
        Write-Host "============================"
        Write-Host "RDP SERVER READY"
        Write-Host "IP: $ip"
        Write-Host "USER: rdpuser"
        Write-Host "PASS: StrongPass123!"
        Write-Host "============================"

    - name: Keep Runner Alive
      run: |
        for ($i=0; $i -lt 72; $i++) {
          Write-Host "RDP Running..."
          Start-Sleep -Seconds 300
        }
